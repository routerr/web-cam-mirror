<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camera Receiver</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <!-- Draggable region for moving the window -->
    <div data-tauri-drag-region class="window-drag-bar"></div>

    <div class="app-container">
      <!-- Active Video Stream -->
      <video id="stream-video" autoplay playsinline></video>

      <!-- Placeholder / Connection Info -->
      <div id="placeholder-overlay" class="placeholder-overlay" data-tauri-drag-region>
        <div class="logo-animation" data-tauri-drag-region>
          <div class="pulse-ring"></div>
          <svg class="camera-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
            <circle cx="12" cy="13" r="4"></circle>
          </svg>
        </div>
        <h1 data-tauri-drag-region>等待相機串流...</h1>
        <p class="subtitle" data-tauri-drag-region>請在同一個局域網 (Wi-Fi) 下的裝置上開啟網頁進行廣播</p>
        
        <div class="ip-card" data-tauri-drag-region>
          <div class="ip-label">廣播設定 URL</div>
          <div class="ip-value" id="receiver-url">載入中...</div>
          <div class="ip-note">請將此 URL 複製或輸入到手機瀏覽器中</div>
        </div>
      </div>

      <!-- Live Overlay Status -->
      <div id="live-overlay" class="live-overlay">
        <div class="status-badge">
          <span class="pulse-dot"></span>
          <span class="status-text">連線中</span>
        </div>
        <div class="hover-controls">
          <button id="btn-top" title="最上層顯示" class="control-btn">📌</button>
          <button id="btn-close" title="關閉" class="control-btn close">✕</button>
        </div>
      </div>
    </div>

    <!-- Custom Right-Click Context Menu -->
    <div id="context-menu" class="context-menu">
      <div class="menu-item" id="menu-top">
        <span class="icon">📌</span>
        <span class="label">最上層顯示 (Always on Top)</span>
        <span class="checkbox" id="menu-top-check">✓</span>
      </div>
      <div class="menu-item" id="menu-copy-url">
        <span class="icon">🔗</span>
        <span class="label">複製廣播 URL</span>
      </div>
      <div class="menu-divider"></div>
      <div class="menu-item close" id="menu-close">
        <span class="icon">✕</span>
        <span class="label">結束程式 (Exit)</span>
      </div>
    </div>
  </body>
</html>
